<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administración - Componentes PC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        .navbar {
            background: #2d3436;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .navbar h1 {
            color: #fff;
            font-size: 1.4rem;
        }
        .navbar h1 span {
            color: #3498db;
        }
        .navbar .nav-links a {
            color: #fff;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: background 0.2s;
            font-size: 0.9rem;
        }
        .navbar .nav-links a:hover {
            background: #444;
        }
        .navbar .nav-links .logout {
            background: #e74c3c;
        }
        .navbar .nav-links .logout:hover {
            background: #c0392b;
        }
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .card h2 {
            color: #2d3436;
            margin-bottom: 0.5rem;
        }
        .card p {
            color: #888;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }
        .menu-item {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            padding: 1.5rem;
            text-align: center;
            text-decoration: none;
            color: #2d3436;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .menu-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }
        .menu-item .icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 0.5rem;
        }
        .menu-item h3 {
            margin-bottom: 0.3rem;
        }
        .menu-item p {
            color: #888;
            font-size: 0.85rem;
            margin: 0;
        }
        .bienvenida {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .bienvenida .avatar {
            background: #3498db;
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>🖥️ <span>Componentes</span> PC</h1>
        <div class="nav-links">
            <a href="/api/v1/cerrar-sesion" class="logout">🚪 Cerrar Sesión</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="bienvenida">
                <div class="avatar">A</div>
                <div>
                    <h2>¡Bienvenido, Admin! 👋</h2>
                    <p>Panel de administración de Componentes PC</p>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>📂 Menú Principal</h2>
            <p style="margin-bottom: 1.5rem;">Seleccioná una opción para continuar</p>

            <div class="menu-grid">
                <a href="/items" class="menu-item">
                    <span class="icon">📦</span>
                    <h3>Items</h3>
                    <p>Ver todos los componentes</p>
                </a>
                <a href="/procedimiento" class="menu-item">
                    <span class="icon">⚙️</span>
                    <h3>Procedimiento</h3>
                    <p>Calcular valor del inventario</p>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
